<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Voice to Text Converter</title>
    <link rel="stylesheet" href="css/styles.css">
</head>
<body>
    <div class="container">
        <h1>Voice to Text Converter</h1>
        <div class="api-key-container">
            <input type="password" id="apiKeyInput" placeholder="Enter your OpenAI API key" class="api-key-input">
            <button id="saveApiKey" class="button">Save API Key</button>
        </div>
        <div class="recorder-container">
            <button id="startRecording" class="button" disabled>
                <span class="button-icon">🎤</span>
                Start Recording
            </button>
            <button id="stopRecording" class="button" disabled>
                <span class="button-icon">⏹</span>
                Stop Recording
            </button>
        </div>
        <div class="status-container">
            <div id="recordingStatus" class="status-indicator"></div>
        </div>
        <div id="transcription" class="transcription-box">
            Please enter your OpenAI API key to begin...
        </div>
    </div>
    <script src="js/voice-recorder.js"></script>
</body>
</html>
